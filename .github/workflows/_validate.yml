name: Monorepo Validate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('package.json', 'pnpm-workspace.yaml', 'tsconfig.base.json', 'apps/*/package.json', 'packages/*/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @tracker/db exec prisma validate --schema prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm --filter @tracker/db prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
